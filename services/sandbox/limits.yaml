# Hard limits for the Python Code Interpreter
runtime:
  # Maximum execution time before SIGKILL
  soft_timeout_seconds: 8   # runner.py SIGTERM
  hard_timeout_seconds: 15  # Kubernetes SIGKILL
  
  # Maximum memory the script can allocate
  memory_limit_mb: 512
  
  # Maximum CPU cores (prevent crypto mining loops)
  cpu_limit: 0.5
  
  # Network Access: STRICTLY DENY
  allow_network: false

files:
  # Max size of input data
  max_input_size_mb: 5
  
  # Allowed modules (whitelist) - Optional, handled by code analysis
  allowed_imports: ["math", "datetime", "json", "pandas", "numpy"]