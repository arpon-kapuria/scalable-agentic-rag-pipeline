
# This is the spec sent to the Ray Job Submission API
entrypoint: "python pipelines/ingestion/main.py"

# Runtime Environment: Dependencies required on the workers
runtime_env:
  working_dir: "."

  # The pip requirements file is generated from our main pyproject.toml but only includes the dependencies needed for the ingestion job (not the entire platform)
  pip: "pipelines/jobs/requirements-ray.txt"

  env_vars:
    # Environment variables injected into workers
    LOG_LEVEL: "INFO"
    # Secrets are injected via K8s Secrets, not here for security

# Resource Request for the Driver (The orchestrator script)
num_cpus: 1
num_gpus: 0